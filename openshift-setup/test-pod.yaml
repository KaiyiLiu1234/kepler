apiVersion: v1
kind: Pod
metadata:
  name: test-metrics-access
  namespace: test-namespace
spec:
  serviceAccountName: test-monitoring-sa
  containers:
  - name: curl
    image: curlimages/curl
    command: ["sleep", "3600"]
    volumeMounts:
      - name: sa-token
        mountPath: /var/run/secrets/tokens
        readOnly: true
  volumes:
  - name: sa-token
    projected:
      sources:
      - serviceAccountToken:
          path: token
          expirationSeconds: 3600
          audience: openshift